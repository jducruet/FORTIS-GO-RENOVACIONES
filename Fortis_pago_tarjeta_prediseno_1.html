*{margin:0;padding:0;box-sizing:border-box;font-family:Montserrat,sans-serif}
html,body{background:#dde4f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px}
.h1{font:800 18px Montserrat;color:#1d3d7a;text-align:center}
.h2{font:500 12.5px Montserrat;color:#6b7a99;text-align:center;margin:3px 0 18px}
.phone{width:390px;max-width:100%;height:800px;background:linear-gradient(180deg,#1E51A2 0%,#163C84 55%,#122f68 100%);border-radius:44px;border:11px solid #05132e;box-shadow:0 24px 60px rgba(10,25,60,.4);overflow:hidden;display:flex;flex-direction:column;position:relative}
.notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#05132e;border-radius:16px;z-index:5}
.bar{display:flex;justify-content:space-between;align-items:center;padding:12px 22px 2px;color:#fff;font-size:13px;font-weight:700}
.hd{display:flex;align-items:center;gap:11px;padding:6px 18px 8px;color:#fff}
.hd svg{cursor:pointer}.hd .t{font-size:18px;font-weight:800}
.scroll{flex:1;overflow-y:auto;padding:6px 18px 24px;position:relative}
.scroll::-webkit-scrollbar{width:5px}.scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:3px}
.genial{display:flex;gap:13px;background:linear-gradient(135deg,rgba(200,217,44,.14),rgba(10,36,86,.5));border:1px solid rgba(200,217,44,.35);border-radius:18px;padding:16px;margin-top:4px}
.gchk{width:46px;height:46px;border-radius:12px;background:#C8D92C;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gtit{font-size:15.5px;font-weight:900;color:#fff;line-height:1.2}
.gsub{font-size:12px;font-weight:500;color:#cfe0f4;margin-top:6px;line-height:1.5}
.gsub b{color:#fff;font-weight:800}
.sect{font-size:11.5px;font-weight:700;color:#9fc0e8;margin:20px 2px 4px;letter-spacing:.3px;text-transform:uppercase}
.opt{display:flex;align-items:center;gap:13px;background:rgba(10,36,86,.45);border:1.6px solid rgba(255,255,255,.13);border-radius:15px;padding:14px 15px;margin-top:10px;cursor:pointer;transition:.15s}
.opt.on{background:rgba(200,217,44,.14);border-color:#C8D92C}
.oic{width:44px;height:44px;border-radius:12px;background:rgba(70,118,196,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt.on .oic{background:rgba(200,217,44,.2)}
.otit{font-size:15.5px;font-weight:800;color:#fff}
.osub{font-size:11px;font-weight:500;color:#9fc0e8;margin-top:2px;line-height:1.35}
.o5{font-size:10.5px;font-weight:800;color:#C8D92C;margin-top:3px}
.oright{margin-left:auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.oamt{font-size:14px;font-weight:900;color:#C8D92C;line-height:1}
.orad{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.35);flex-shrink:0}
.opt.on .orad{background:#C8D92C;border-color:#C8D92C;display:flex;align-items:center;justify-content:center}
.detail{margin-top:6px}
.hintwait{text-align:center;font-size:11.5px;font-weight:600;color:#7f97bd;margin:22px 0 8px;display:flex;flex-direction:column;align-items:center;gap:8px}
.methods{display:flex;gap:10px;margin-top:11px}
.mbtn{flex:1;border:0;border-radius:13px;padding:14px 8px;text-align:center;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.mbtn.card{background:#C8D92C;color:#16320f;box-shadow:0 6px 16px rgba(200,217,44,.26)}
.mbtn.yap{background:#F26A21;color:#fff;box-shadow:0 6px 16px rgba(242,106,33,.3)}
.mbtn.cardline{background:transparent;border:1.5px solid rgba(255,255,255,.35);color:#fff}
.plan{background:rgba(10,36,86,.4);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;padding:15px;margin-top:11px;color:#fff;position:relative}
.plan.rec{border-color:#C8D92C}
.rectag{position:absolute;top:-9px;left:15px;background:#C8D92C;color:#16320f;font-size:8.5px;font-weight:900;padding:3px 9px;border-radius:8px;text-transform:uppercase;letter-spacing:.3px}
.prow{display:flex;justify-content:space-between;align-items:flex-start}
.ptit{font-size:15.5px;font-weight:800;line-height:1.15}
.pbig{font-size:22px;font-weight:900;color:#C8D92C;line-height:1;text-align:right}
.punit{font-size:10px;font-weight:600;color:#9fc0e8;text-align:right;margin-bottom:2px}
.save{display:inline-block;background:#C8D92C;color:#16320f;font-size:9px;font-weight:900;padding:3px 8px;border-radius:8px;margin-top:7px;text-transform:uppercase;letter-spacing:.3px}
.pdesc{font-size:11.5px;font-weight:500;color:#cfe0f4;margin-top:8px;line-height:1.45}
.preq{font-size:10px;font-weight:700;color:#9fc0e8;margin-top:7px}
.amtline{font-size:12.5px;font-weight:600;color:#cfe0f4;margin:2px 2px 0}
.amtline b{color:#C8D92C;font-weight:900}
.ctx{display:flex;justify-content:space-between;align-items:center;background:rgba(200,217,44,.1);border:1px solid rgba(200,217,44,.4);border-radius:13px;padding:11px 14px;margin-top:4px}
.ctxl{font-size:9.5px;font-weight:700;color:#9fc0e8;text-transform:uppercase;letter-spacing:.3px}
.ctxn{font-size:14px;font-weight:800;color:#fff;margin-top:1px}
.ctxa{font-size:16px;font-weight:900;color:#C8D92C}
.field{margin-top:14px}
.flabel{font-size:10.5px;font-weight:700;color:#9fc0e8;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.finput{width:100%;background:rgba(10,36,86,.5);border:1.5px solid rgba(255,255,255,.16);border-radius:12px;padding:13px 14px;color:#fff;font-size:15px;font-weight:700;font-family:Montserrat;outline:none}
.finput::placeholder{color:#6f8bb5;font-weight:600}
.frow{display:flex;gap:12px}.frow>div{flex:1}
.autonote{display:flex;gap:8px;align-items:flex-start;font-size:11px;font-weight:600;color:#bcd2ee;margin-top:14px;line-height:1.4;background:rgba(70,118,196,.16);border-radius:11px;padding:10px 12px}
.overlay{position:absolute;inset:0;z-index:30;background:rgba(6,16,40,.62);display:flex;align-items:flex-end}
.sheet{width:100%;background:linear-gradient(180deg,#1E51A2,#163C84);border-radius:22px 22px 0 0;padding:16px 20px 22px;box-shadow:0 -12px 30px rgba(0,0,0,.45)}
.handle{width:42px;height:4px;border-radius:2px;background:rgba(255,255,255,.3);margin:0 auto 14px}
.sh-title{font-size:16.5px;font-weight:900;color:#fff}
.sh-body{font-size:13px;font-weight:500;color:#dfe9f7;margin-top:10px;line-height:1.55}
.chkrow{display:flex;align-items:flex-start;gap:11px;margin-top:16px;cursor:pointer}
.cbox{width:24px;height:24px;border-radius:7px;border:2px solid rgba(255,255,255,.4);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.cbox.on{background:#C8D92C;border-color:#C8D92C}
.chklbl{font-size:12.5px;font-weight:700;color:#fff;line-height:1.4}
.cancel{text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.6);margin-top:12px;cursor:pointer}

</style></head>
<body>
<div class="h1">Fortis GO - Pago + datos de tarjeta (pre-diseño)</div>
<div class="h2">Forma de pago, autorización y datos de tarjeta.</div>
<div class="phone">
  <div class="notch"></div>
  <div class="bar"><span>9:41</span><span>Fortis GO</span></div>
  <div class="hd"><svg onclick="back()" width="22" height="22" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg><span class="t" id="hdt">Renovación</span></div>
  <div class="scroll" id="scroll"></div>
  <div id="modalroot"></div>
  <div onclick="reset()" title="Reiniciar" style="position:absolute;bottom:16px;right:14px;z-index:20;cursor:pointer;display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.9);box-shadow:0 4px 12px rgba(0,0,0,.3)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1d3d7a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></div>
</div>
<script>

var CARD='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/></svg>';
var YAPTXT='<span style="font:900 14px Montserrat;font-style:italic">yappy</span>';
var TICK='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#16320f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
var state={screen:'main', mode:null, modal:false, accepted:false, ctx:null};
function back(){ if(state.screen==='cardform'){state.screen='main';render();} }
function reset(){ state={screen:'main', mode:null, modal:false, accepted:false, ctx:null}; render(); renderModal(); }
function pick(m){ state.mode=(state.mode===m?null:m); render(); if(state.mode)setTimeout(function(){var d=document.getElementById('detail');if(d)d.scrollIntoView({behavior:'smooth',block:'nearest'});},60); }
function askAuto(){ state.modal=true; state.accepted=false; renderModal(); }
function toggleAcc(){ state.accepted=!state.accepted; renderModal(); }
function closeModal(){ state.modal=false; renderModal(); }
function goCard(ctx){ state.ctx=ctx; state.modal=false; state.screen='cardform'; render(); renderModal(); }
function proceedAuto(){ goCard({label:'Descuentos automáticos', amount:'$80.75/mes', auto:true}); }
function render(){
  document.getElementById('hdt').innerText = state.screen==='cardform'?'Datos de tarjeta':'Renovación';
  var h='';
  if(state.screen==='cardform'){
    var c=state.ctx||{};
    h+='<div class="ctx"><div><div class="ctxl">Estás pagando</div><div class="ctxn">'+c.label+'</div></div><div class="ctxa">'+c.amount+'</div></div>';
    h+='<div class="field"><div class="flabel">Número de tarjeta</div><input class="finput" inputmode="numeric" placeholder="0000 0000 0000 0000"></div>';
    h+='<div class="frow"><div class="field"><div class="flabel">Vencimiento</div><input class="finput" placeholder="MM / AA"></div><div class="field"><div class="flabel">CVV</div><input class="finput" inputmode="numeric" placeholder="123"></div></div>';
    h+='<div class="field"><div class="flabel">Nombre en la tarjeta</div><input class="finput" placeholder="Como aparece en la tarjeta"></div>';
    if(c.auto) h+='<div class="autonote"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#C8D92C" stroke-width="2.2" style="flex-shrink:0;margin-top:1px" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-6.2-8.5"/><path d="M21 4v5h-5"/></svg>Con esta tarjeta se harán los descuentos automáticos cada mes hasta cancelar el saldo de la póliza.</div>';
    h+='<button class="mbtn card" style="width:100%;margin-top:18px">'+CARD+' '+(c.auto?'Activar y pagar '+c.amount:'Pagar '+c.amount)+'</button>';
    h+='<div style="height:10px"></div>';
    document.getElementById('scroll').innerHTML=h; return;
  }
  h+='<div class="genial"><div class="gchk"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#16320f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div><div><div class="gtit">¡Genial! Vamos a procesar tu renovación</div><div class="gsub">Estás renovando tu <b>Mercedes CLK / 2020</b>. Para emitir y enviarte la póliza, completa el pago.</div></div></div>';
  h+='<div class="sect">Cómo deseas pagar?</div>';
  h+='<div class="opt'+(state.mode==='uno'?' on':'')+'" onclick="pick(\'uno\')"><div class="oic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C8D92C" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5h4a1.8 1.8 0 010 3.6h-3a1.8 1.8 0 000 3.6h4"/></svg></div><div><div class="otit">Un solo pago</div><div class="osub">Pagas el 100% hoy - ahorra 5%</div></div><div class="oright"><div class="oamt">$807.50</div><div class="orad">'+(state.mode==='uno'?TICK:'')+'</div></div></div>';
  h+='<div class="opt'+(state.mode==='diez'?' on':'')+'" onclick="pick(\'diez\')"><div class="oic"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C8D92C" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/></svg></div><div><div class="otit">En 10 pagos</div><div class="osub">Divide tu prima en 10 mensualidades</div><div class="o5">Con descuentos automáticos ahorras 5%</div></div><div class="oright"><div class="oamt">$80.75/mes</div><div class="orad">'+(state.mode==='diez'?TICK:'')+'</div></div></div>';
  h+='<div class="detail" id="detail">';
  if(!state.mode){
    h+='<div class="hintwait"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7f97bd" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>Elige arriba y te muestro las opciones de pago.</div>';
  } else if(state.mode==='uno'){
    h+='<div class="sect">Paga con</div>';
    h+='<div class="amtline">Total a pagar hoy: <b>$807.50</b> <span style="color:#8ba3c7;text-decoration:line-through;font-weight:600">$850.00</span></div>';
    h+='<div class="methods"><button class="mbtn card" onclick="goCard({label:\'Pago total\',amount:\'$807.50\',auto:false})">'+CARD+' Tarjeta</button><button class="mbtn yap">'+YAPTXT+'</button></div>';
  } else {
    h+='<div class="sect">Elige cómo</div>';
    h+='<div class="plan rec"><div class="rectag">Recomendado</div><div class="prow"><div style="flex:1"><div class="ptit">Descuentos automáticos</div></div><div><div class="punit">c/u</div><div class="pbig">$80.75</div></div></div><div><span class="save">Ahorra 5%</span></div><div class="pdesc">Se cargan solos a tu tarjeta cada mes. No tienes que hacer nada.</div><div class="preq">Requiere tarjeta de crédito</div><button class="mbtn card" style="width:100%;margin-top:12px" onclick="askAuto()">'+CARD+' Activar con tarjeta</button></div>';
    h+='<div class="plan"><div class="prow"><div style="flex:1"><div class="ptit">En cuotas (manual)</div></div><div><div class="punit">1ª de 10</div><div class="pbig">$85.00</div></div></div><div class="pdesc">Hoy pagas la 1ª de $85.00; las 9 restantes las pagas tú cada mes.</div><div class="methods"><button class="mbtn cardline" onclick="goCard({label:\'Pago en cuotas\',amount:\'$85.00 hoy\',auto:false})">'+CARD+' Tarjeta</button><button class="mbtn yap">'+YAPTXT+'</button></div></div>';
  }
  h+='</div>';
  document.getElementById('scroll').innerHTML=h;
}
function renderModal(){
  var m=document.getElementById('modalroot');
  if(!state.modal){m.innerHTML='';return;}
  var h='<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet">';
  h+='<div class="handle"></div>';
  h+='<div class="sh-title">Autorización de descuentos automáticos</div>';
  h+='<div class="sh-body">Al elegir esta opción, acepto que se hagan descuentos automáticos a mi tarjeta de crédito hasta cancelar el saldo de la póliza.</div>';
  h+='<div class="chkrow" onclick="toggleAcc()"><div class="cbox'+(state.accepted?' on':'')+'">'+(state.accepted?TICK:'')+'</div><div class="chklbl">Acepto los descuentos automáticos a mi tarjeta</div></div>';
  if(state.accepted){ h+='<button class="mbtn card" style="width:100%;margin-top:16px" onclick="proceedAuto()">Continuar</button>'; }
  else { h+='<button class="mbtn card" style="width:100%;margin-top:16px;opacity:.45;pointer-events:none">Continuar</button>'; }
  h+='<div class="cancel" onclick="closeModal()">Cancelar</div>';
  h+='</div></div>';
  m.innerHTML=h;
}
render();

</script>
</body></html>
