<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fortis GO">
<meta name="theme-color" content="#163C84">
<title>Fortis GO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#dde4f0; }
.opc-hd{display:flex;align-items:center;gap:11px;padding:6px 18px 8px;color:#fff}
.opc-hd svg{cursor:pointer}
.opc-hd .t{font-size:18px;font-weight:800}
.opc-scroll{flex:1;overflow-y:auto;padding:0 16px 20px;position:relative}
.opc-scroll::-webkit-scrollbar{width:5px}.opc-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:3px}
.intro{font-size:12.5px;font-weight:600;color:#dfe9f7;line-height:1.45;margin:8px 4px 18px;text-align:center}
.intro b{color:#C8D92C;font-weight:800}
.ded{display:flex;gap:9px;margin-top:2px}
.ded .b{position:relative;flex:1;cursor:pointer;background:rgba(10,36,86,.4);border:1.6px solid rgba(255,255,255,.14);border-radius:13px;padding:10px 6px;text-align:center;color:#fff;transition:.15s}
.ded .b.on{background:rgba(200,217,44,.16);border-color:#C8D92C}
.ded .b .lv{font-size:14px;font-weight:800}.ded .b.on .lv{color:#eaf3a6}
.ded .tag{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#C8D92C;color:#16320f;font-size:8px;font-weight:900;padding:3px 9px;border-radius:9px;letter-spacing:.4px;white-space:nowrap;text-transform:uppercase;box-shadow:0 3px 8px rgba(200,217,44,.4)}
.sect{font-size:11.5px;font-weight:700;color:#9fc0e8;margin:20px 4px 8px;letter-spacing:.4px;text-transform:uppercase}
.sticky{position:sticky;top:0;z-index:10;background:#163C84;margin:0 -16px;padding:10px 16px 12px;box-shadow:0 12px 16px -6px rgba(5,15,40,.6)}
.sticky .sect{margin-top:12px}
.mini{border-radius:13px;padding:10px 13px;margin-top:8px;color:#fff;position:relative}
.mini.cur{background:linear-gradient(135deg,rgba(200,217,44,.15),rgba(10,36,86,.55));border:1.5px solid #C8D92C}
.mini.opt{background:rgba(10,36,86,.4);border:1.5px solid rgba(255,255,255,.1);cursor:pointer;transition:.15s}
.mini.opt.sel{background:rgba(200,217,44,.14);border-color:#C8D92C}
.mtop{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.name{font-size:14.5px;font-weight:800;flex:1;line-height:1.1;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.best-tag{background:#C8D92C;color:#16320f;font-size:8px;font-weight:900;padding:2px 7px;border-radius:7px;letter-spacing:.3px;text-transform:uppercase}
.pblk{text-align:right}
.pcap{font-size:8.5px;font-weight:700;color:#9fc0e8;text-transform:uppercase;letter-spacing:.3px}
.pval{font-size:18px;font-weight:900;color:#C8D92C;line-height:1;margin-top:1px}
.chk{width:19px;height:19px;border-radius:50%;border:2px solid rgba(255,255,255,.35);flex-shrink:0;margin-left:8px}
.chk.ghost{visibility:hidden}
.mini.opt.sel .chk{background:#C8D92C;border-color:#C8D92C}
.dcap{font-size:8.5px;font-weight:700;color:#9fc0e8;text-transform:uppercase;letter-spacing:.3px;margin-top:8px}
.deds{display:flex;justify-content:space-between;align-items:baseline;margin-top:3px}
.deds .item{font-size:12px;font-weight:600;color:#cfe0f4}
.deds .item b{font-size:16.5px;font-weight:900;color:#fff;margin-left:5px}
.cta{width:100%;background:#C8D92C;border:0;border-radius:14px;padding:14px;text-align:center;color:#16320f;font-size:15px;font-weight:900;margin-top:20px;cursor:pointer;box-shadow:0 8px 20px rgba(200,217,44,.28);font-family:Montserrat,sans-serif}
.cta:disabled{background:rgba(200,217,44,.25);color:rgba(22,50,15,.5);box-shadow:none;cursor:default}
.overlay{position:absolute;inset:0;z-index:30;background:rgba(6,16,40,.62);display:flex;align-items:flex-end;animation:opcfade .15s ease}
@keyframes opcfade{from{opacity:0}to{opacity:1}}
.sheet{width:100%;background:linear-gradient(180deg,#1E51A2,#163C84);border-radius:22px 22px 0 0;padding:16px 20px 22px;box-shadow:0 -12px 30px rgba(0,0,0,.45);animation:opcup .22s ease}
@keyframes opcup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:42px;height:4px;border-radius:2px;background:rgba(255,255,255,.3);margin:0 auto 14px}
.sh-title{font-size:17px;font-weight:900;color:#fff}
.sh-sub{font-size:12.5px;font-weight:500;color:#cfe0f4;margin-top:6px;line-height:1.45}
.sh-sub b{color:#fff;font-weight:800}
.delta{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.drow{display:flex;align-items:center;gap:11px;background:rgba(10,36,86,.45);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:9px 12px}
.darr{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.darr.good{background:rgba(126,224,168,.16)}.darr.warn{background:rgba(255,190,80,.16)}.darr.neu{background:rgba(159,192,232,.14)}
.dtxt{font-size:12.5px;font-weight:600;color:#eaf1fb;flex:1}
.dtxt b.g{color:#7ee0a8;font-weight:900}.dtxt b.w{color:#ffc04d;font-weight:900}.dtxt b.n{color:#cfe0f4;font-weight:900}
.sh-note{font-size:11.5px;font-weight:500;color:#9fc0e8;margin-top:12px;line-height:1.45}
.chkrow{display:flex;align-items:center;gap:11px;margin-top:15px;cursor:pointer}
.cbox{width:24px;height:24px;border-radius:7px;border:2px solid rgba(255,255,255,.4);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cbox.on{background:#C8D92C;border-color:#C8D92C}
.chklbl{font-size:12.5px;font-weight:700;color:#fff;line-height:1.35}
.cancel{text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.6);margin-top:12px;cursor:pointer}

</style></head>
<body>
<div id="root"></div>
<template id="view">
<div style="min-height:100vh;width:100%;background:radial-gradient(120% 80% at 50% 0%,#eef2f9 0%,#dde4f0 60%,#cfd8e8 100%);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:34px 20px 40px;box-sizing:border-box;font-family:Montserrat,sans-serif">

  <div style="display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:22px;text-align:center">
    <div style="font:800 19px Montserrat,sans-serif;color:#1d3d7a;letter-spacing:.3px">Fortis GO · Prototipo interactivo</div>
    <div style="font:500 13px Montserrat,sans-serif;color:#6b7a99">Toca los botones para recorrer el flujo. Usa la flecha ← para volver.</div>
  </div>

  <!-- ===================== PHONE ===================== -->
  <div style="position:relative;width:330px;height:706px;background:#0a0a0a;border-radius:50px;padding:9px;box-shadow:0 22px 60px rgba(20,40,90,.34)">
    <div style="position:relative;width:100%;height:100%;border-radius:42px;overflow:hidden;background:linear-gradient(162deg,#3663BE 0%,#214A97 36%,#163C84 68%,#102F6E 100%)">
      <sc-if value="{{ noModalOpen }}"><div onclick="{{ resetDemo }}" style="position:absolute;bottom:74px;right:11px;z-index:60;cursor:pointer;display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.9);box-shadow:0 4px 12px rgba(0,0,0,.3);backdrop-filter:blur(2px)"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1d3d7a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></div></sc-if>
      <div style="position:absolute;inset:0;background:linear-gradient(118deg,transparent 27%,rgba(255,255,255,.06) 28%,rgba(255,255,255,.06) 44%,transparent 45%);pointer-events:none;z-index:1"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(232deg,transparent 50%,rgba(0,0,0,.13) 51%);pointer-events:none;z-index:1"></div>
      <div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);width:100px;height:28px;background:#000;border-radius:15px;z-index:6"></div>

      <div style="position:absolute;inset:0;display:flex;flex-direction:column;color:#fff;z-index:2">

        <!-- status bar (constant) -->
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 24px 2px;color:#fff;font-weight:700;font-size:13px;flex-shrink:0">
          <span>9:41</span>
          <div style="display:flex;gap:6px;align-items:center">
            <svg width="17" height="11" viewBox="0 0 17 11" fill="#fff"><rect x="0" y="7" width="3" height="4" rx="1"></rect><rect x="4.5" y="5" width="3" height="6" rx="1"></rect><rect x="9" y="2.5" width="3" height="8.5" rx="1"></rect><rect x="13.5" y="0" width="3" height="11" rx="1"></rect></svg>
            <svg width="23" height="11" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="19" height="10" rx="2.5" stroke="#fff" stroke-opacity=".55"></rect><rect x="2.5" y="2.5" width="14" height="7" rx="1.3" fill="#fff"></rect><rect x="21" y="4" width="2" height="4" rx="1" fill="#fff"></rect></svg>
          </div>
        </div>

        <!-- ===== PUSH NOTIFICATIONS OVERLAY ===== -->
        <sc-if value="{{ pushVisible }}">
        <div style="position:absolute;top:46px;left:0;right:0;z-index:30;display:flex;flex-direction:column;gap:9px;padding:0 11px;pointer-events:none">
          <div style="background:rgba(244,246,250,.93);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:18px;padding:11px 13px;display:flex;gap:11px;box-shadow:0 10px 26px rgba(10,20,50,.28);animation:pushIn .45s cubic-bezier(.2,.9,.3,1.2)">
            <div style="width:34px;height:34px;border-radius:9px;background:#15309E;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 4l9 5.5"></path><path d="M5 10v8h14v-8"></path><path d="M9 18v-4h6v4"></path></svg></div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:12.5px;font-weight:800;color:#1b2a4a">Banco General</span><span style="font-size:10.5px;font-weight:500;color:#8a92a6">ahora</span></div>
              <div style="font-size:12px;font-weight:500;color:#39435c;line-height:1.4;margin-top:2px">Se cargó un pago Yappy de {{ yappyMonto }} a Fortis Seguros.</div>
            </div>
          </div>
          <div style="background:rgba(244,246,250,.93);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:18px;padding:11px 13px;display:flex;gap:11px;box-shadow:0 10px 26px rgba(10,20,50,.28);animation:pushIn .45s cubic-bezier(.2,.9,.3,1.2) .25s both">
            <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,#1A4694,#102F6E);display:flex;align-items:center;justify-content:center;flex-shrink:0"><div style="position:relative;width:17px;height:20px"><svg width="17" height="20" viewBox="0 0 24 26" fill="#fff"><path d="M12 1 22 5.2V13c0 7-5.2 10.3-10 12.3C7.2 23.3 2 20 2 13V5.2Z"></path></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#1A4694;font-size:11px;font-weight:900;padding-bottom:2px">+</div></div></div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:12.5px;font-weight:800;color:#1b2a4a">Fortis GO</span><span style="font-size:10.5px;font-weight:500;color:#8a92a6">ahora</span></div>
              <div style="font-size:12px;font-weight:500;color:#39435c;line-height:1.4;margin-top:2px">Pago recibido. Estamos procesando tu renovación.</div>
            </div>
          </div>
        </div>
        </sc-if>

        <!-- ===== SWAPPABLE CONTENT ===== -->
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0">

          <!-- ---------- 00 HOME (dashboard) ---------- -->
          <sc-if value="{{ isHome }}">
          <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fortisScreenIn .28s ease">
            <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding:8px 20px 0">
              <div style="display:flex;align-items:center;gap:6px">
                <div style="position:relative;width:18px;height:21px"><svg width="18" height="21" viewBox="0 0 24 26" fill="#fff"><path d="M12 1 22 5.2V13c0 7-5.2 10.3-10 12.3C7.2 23.3 2 20 2 13V5.2Z"></path></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#1A4694;font-size:12px;font-weight:900;line-height:1;padding-bottom:2px">+</div></div>
                <span style="font-size:20px;font-weight:700;letter-spacing:.4px">Fortis</span>
              </div>
              <div style="font-size:16px;font-weight:900;font-style:italic;letter-spacing:1.4px;margin-top:-3px">GO</div>
              <div style="font-size:16px;font-weight:800;letter-spacing:.3px;margin-top:14px;text-align:center">Ariel Rene Botello Gonzalez</div>
              <div style="width:100%;height:1.5px;background:rgba(255,255,255,.35);margin-top:10px"></div>
            </div>
            <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px 16px;overflow-y:auto;align-content:start">
              <div onclick="{{ goVerPolizas }}" style="cursor:pointer;background:rgba(70,118,196,.28);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:92px">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 20 6v6c0 5-4 7.5-8 9-4-1.5-8-4-8-9V6Z"></path></svg>
                <div style="font-size:13px;font-weight:700;text-align:center">Mis Pólizas</div>
              </div>
              <div onclick="{{ goDetalle }}" style="cursor:pointer;background:rgba(70,118,196,.28);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:92px">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6h10M10 12h10M10 18h10"></path><path d="m3 6 1.3 1.3L6.5 4.7"></path><path d="m3 12 1.3 1.3L6.5 10.7"></path><path d="m3 18 1.3 1.3L6.5 16.7"></path></svg>
                <div style="font-size:13px;font-weight:700;text-align:center">Mis Reclamos</div>
              </div>
              <div onclick="{{ goDetalle }}" style="cursor:pointer;background:rgba(70,118,196,.28);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:92px">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h11M4 11h7M4 16h5"></path><path d="m16 13.5 4-4 1.8 1.8-4 4H16z"></path></svg>
                <div style="font-size:13px;font-weight:700;text-align:center">Nuevo Reclamo</div>
              </div>
              <div onclick="{{ goDetalle }}" style="cursor:pointer;background:rgba(70,118,196,.28);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:92px">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="8" cy="11" r="2"></circle><path d="M13 9.5h5M13 13h5M5 15.5c.4-1.2 1.5-1.9 3-1.9s2.6.7 3 1.9"></path></svg>
                <div style="font-size:13px;font-weight:700;text-align:center">Ver Carnet</div>
              </div>
              <div onclick="{{ goDetalle }}" style="cursor:pointer;background:rgba(70,118,196,.28);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:92px">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 20 6v6c0 5-4 7.5-8 9-4-1.5-8-4-8-9V6Z"></path><path d="M12 9.5v5M9.5 12h5"></path></svg>
                <div style="font-size:13px;font-weight:700;text-align:center">Redes Médicas</div>
              </div>
              <div onclick="{{ goDetalle }}" style="cursor:pointer;background:rgba(70,118,196,.28);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:92px">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"></rect><path d="M9 4h6v3H9z"></path><path d="M12 11v6M9 14h6"></path></svg>
                <div style="font-size:13px;font-weight:700;text-align:center">Formularios</div>
              </div>
              <div style="background:rgba(70,118,196,.16);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:92px;opacity:.5">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"></path><path d="M6 10v9h12v-9"></path><path d="m9.5 14 1.8 1.8L15 12"></path></svg>
                <div style="font-size:13px;font-weight:700;text-align:center">Saldos y Pagos</div>
              </div>
              <div style="background:rgba(70,118,196,.16);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;min-height:92px;opacity:.5">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"></path><path d="M6 10v9h12v-9"></path><path d="m9.5 14 1.8 1.8L15 12"></path></svg>
                <div style="font-size:13px;font-weight:700;text-align:center">Hacer pago en línea</div>
              </div>
            </div>
          </div>
          </sc-if>

          <!-- ---------- 00b PÓLIZAS ---------- -->
          <sc-if value="{{ isPolizas }}">
          <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fortisScreenIn .28s ease">
            <div style="position:relative;display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding:6px 18px 0">
              <div onclick="{{ back }}" style="cursor:pointer;position:absolute;left:14px;top:6px;display:flex"><svg width="22" height="22" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M15 5l-7 7 7 7"></path></svg></div>
              <div style="display:flex;align-items:center;gap:6px">
                <div style="position:relative;width:18px;height:21px"><svg width="18" height="21" viewBox="0 0 24 26" fill="#fff"><path d="M12 1 22 5.2V13c0 7-5.2 10.3-10 12.3C7.2 23.3 2 20 2 13V5.2Z"></path></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#1A4694;font-size:12px;font-weight:900;line-height:1;padding-bottom:2px">+</div></div>
                <span style="font-size:20px;font-weight:700;letter-spacing:.4px">Fortis</span>
              </div>
              <div style="font-size:16px;font-weight:900;font-style:italic;letter-spacing:1.4px;margin-top:-3px">GO</div>
              <div style="font-size:17px;font-weight:800;letter-spacing:.5px;margin-top:12px">Pólizas</div>
              <div style="width:100%;height:1.5px;background:rgba(255,255,255,.35);margin-top:10px"></div>
            </div>
